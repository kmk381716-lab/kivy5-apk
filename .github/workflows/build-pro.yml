name: Build APK (Pro)

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System packages
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            python3 python3-pip \
            openjdk-17-jdk \
            libffi-dev libssl-dev \
            liblzma-dev libncurses5 libsqlite3-dev

      - name: Python deps
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython buildozer

      - name: Build Kivy APK
        run: buildozer android debug

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kivy_apk
          path: bin/*.apk
